services:
  snake-arena:
    build:
      context: .
      dockerfile: Dockerfile
    image: snake-arena:latest
    container_name: snake-arena
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LEADERBOARD_PATH: /data/leaderboard.json
    volumes:
      - snake-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/leaderboard"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  snake-data:
